name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Smoke import
        run: python -c "import step2point; print(step2point.__version__)"

  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Unit tests
        run: pytest -q tests/unit
      - name: Integration tests
        run: pytest -q tests/integration -m "not root"
      - name: Physics sanity tests
        run: pytest -q tests/physics

  edm4hep-root-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cvmfs-contrib/github-action-cvmfs@v4
        with:
          cvmfs_repositories: "sw.hsf.org"
      - name: Select Key4hep setup
        id: key4hep
        shell: bash
        run: |
          if [ -f /cvmfs/sw.hsf.org/key4hep/setup.sh ]; then
            echo "script=/cvmfs/sw.hsf.org/key4hep/setup.sh" >> "$GITHUB_OUTPUT"
          else
            echo "No Key4hep setup found under /cvmfs" >&2
            exit 1
          fi
      - name: Install package in Key4hep environment
        shell: bash -l {0}
        run: |
          source "${{ steps.key4hep.outputs.script }}"
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Smoke import podio and edm4hep
        shell: bash -l {0}
        run: |
          source "${{ steps.key4hep.outputs.script }}"
          python - <<'PY'
          from podio import root_io  # noqa: F401
          import edm4hep  # noqa: F401
          print("podio and edm4hep available")
          PY
      - name: EDM4hep ROOT integration tests
        shell: bash -l {0}
        run: |
          source "${{ steps.key4hep.outputs.script }}"
          pytest -q tests/integration/test_root_reader_optional.py

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[docs]
      - name: Build docs
        run: mkdocs build --strict

  cpp-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure CMake
        run: cmake -S cpp -B cpp/build
      - name: Build C++ tests
        run: cmake --build cpp/build --config Release
      - name: Run C++ tests
        run: ctest --test-dir cpp/build --output-on-failure
