name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,test]
      - name: Lint
        run: ruff check .
      - name: Smoke import
        run: python -c "import step2point; print(step2point.__version__)"

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,test]
      - name: Unit tests
        run: pytest -q tests/unit
      - name: Integration tests
        run: pytest -q tests/integration -m "not root and not odd_geometry"
      - name: Debug HDBSCAN summary
        if: always()
        run: cat /tmp/pytest-of-runner/pytest-*/test_hdbscan_clustering_output0/pipeline_out_hdbscan_clustering/compression_summary_hdbscan_clustering.txt || true
      - name: Physics sanity tests
        run: pytest -q tests/physics

  odd-geometry-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone OpenDataDetector
        run: git clone --depth 1 https://gitlab.cern.ch/acts/OpenDataDetector.git OpenDataDetector
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,test]
      - name: ODD geometry integration tests
        run: pytest -q tests/integration -m "odd_geometry"

  edm4hep-root-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Docker
        uses: docker/setup-buildx-action@v3
      - uses: cvmfs-contrib/github-action-cvmfs@v4
        with:
          cvmfs_repositories: "sw.hsf.org"
      - name: Start Key4hep container
        run: |
          docker run --name step2point-key4hep-ci \
                     --privileged \
                     -v "${GITHUB_WORKSPACE}:/workspace" \
                     -d ghcr.io/key4hep/key4hep-images/alma9-cvmfs \
                     tail -f /dev/null
      - name: Mount CVMFS in container
        run: docker exec step2point-key4hep-ci /bin/bash -c '/mount.sh'
      - name: Install package in Key4hep environment
        run: |
          docker exec step2point-key4hep-ci /bin/bash -lc '
            set -eo pipefail
            cd /workspace
            source /cvmfs/sw.hsf.org/key4hep/setup.sh
            python -m venv --system-site-packages .venv-key4hep
            source .venv-key4hep/bin/activate
            python -m pip install -e .[dev,test]
          '
      - name: Smoke import podio and edm4hep
        run: |
          docker exec step2point-key4hep-ci /bin/bash -lc '
            set -eo pipefail
            cd /workspace
            source /cvmfs/sw.hsf.org/key4hep/setup.sh
            source .venv-key4hep/bin/activate
            python -c "from podio import root_io; import edm4hep; print(\"podio and edm4hep available\")"
          '
      - name: EDM4hep ROOT integration tests
        run: |
          docker exec step2point-key4hep-ci /bin/bash -lc '
            set -eo pipefail
            cd /workspace
            source /cvmfs/sw.hsf.org/key4hep/setup.sh
            source .venv-key4hep/bin/activate
            pytest -q tests/integration/test_root_reader_optional.py
          '

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[docs]
      - name: Build docs
        run: mkdocs build --strict

  cpp-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure CMake
        run: cmake -S cpp -B cpp/build
      - name: Build C++ tests
        run: cmake --build cpp/build --config Release
      - name: Run C++ tests
        run: ctest --test-dir cpp/build --output-on-failure
