name: Regression

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  hdf5-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,test]
      - name: Run integration tests
        run: pytest -q tests/integration/test_pipeline_tiny.py
      - name: Run physics sanity suite
        run: pytest -q tests/physics
      - name: Generate validation plots
        run: |
          python examples/generate_validation_plots.py \
            --input tests/data/ODD_gamma_10ev_theta90deg_phi0deg_posX0mmY1250mmZ0mm_10GeV.h5 \
            --algorithm merge_within_cell \
            --outdir outputs/ci_validation_plots
      - name: Upload validation plots
        uses: actions/upload-artifact@v4
        with:
          name: hdf5-validation-plots
          path: outputs/ci_validation_plots/

  hdbscan-validation-plots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,test]
      - name: Generate HDBSCAN validation plots
        run: |
          python examples/generate_validation_plots.py \
            --input tests/data/ODD_gamma_10ev_theta90deg_phi0deg_posX0mmY1250mmZ0mm_10GeV.h5 \
            --algorithm hdbscan \
            --hdbscan-cell-id-encoding 'system:8,barrel:3,module:4,stave:1,layer:6,slice:5,x:32:-16,y:-16' \
            --min-cluster-size 5 \
            --min-samples 3 \
            --merge-scope system_layer \
            --use-time \
            --axis 0 1 0 \
            --origin 0 1250 0 \
            --outdir outputs/ci_hdbscan_validation_plots
      - name: Upload HDBSCAN validation plots
        uses: actions/upload-artifact@v4
        with:
          name: hdbscan-validation-plots
          path: outputs/ci_hdbscan_validation_plots/

  edm4hep-root-regression:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Check out OpenDataDetector
        run: |
          git clone --depth 1 https://gitlab.cern.ch/acts/OpenDataDetector.git OpenDataDetector
      - name: Install Docker
        uses: docker/setup-buildx-action@v3
      - uses: cvmfs-contrib/github-action-cvmfs@v4
        with:
          cvmfs_repositories: "sw.hsf.org"
      - name: Start Key4hep container
        run: |
          docker run --name step2point-key4hep-regression \
                     --privileged \
                     -v "${GITHUB_WORKSPACE}:/workspace" \
                     -d ghcr.io/key4hep/key4hep-images/alma9-cvmfs \
                     tail -f /dev/null
      - name: Mount CVMFS in container
        run: docker exec step2point-key4hep-regression /bin/bash -c '/mount.sh'
      - name: Install package in Key4hep environment
        run: |
          docker exec step2point-key4hep-regression /bin/bash -lc '
            set -eo pipefail
            cd /workspace
            source /cvmfs/sw.hsf.org/key4hep/setup.sh
            python -m venv --system-site-packages .venv-key4hep
            source .venv-key4hep/bin/activate
            python -m pip install -e .[dev]
          '
      - name: Check podio and edm4hep imports
        run: |
          docker exec step2point-key4hep-regression /bin/bash -lc '
            set -eo pipefail
            cd /workspace
            source /cvmfs/sw.hsf.org/key4hep/setup.sh
            source .venv-key4hep/bin/activate
            python -c "from podio import root_io; import edm4hep; print(\"podio and edm4hep available\")"
          '
      - name: Run ROOT integration test
        run: |
          docker exec step2point-key4hep-regression /bin/bash -lc '
            set -eo pipefail
            cd /workspace
            source /cvmfs/sw.hsf.org/key4hep/setup.sh
            source .venv-key4hep/bin/activate
            pytest -q tests/integration/test_root_reader_optional.py
          '
      - name: Generate ROOT validation plots
        run: |
          docker exec step2point-key4hep-regression /bin/bash -lc '
            set -eo pipefail
            cd /workspace
            source /cvmfs/sw.hsf.org/key4hep/setup.sh
            source .venv-key4hep/bin/activate
            python examples/generate_validation_plots.py \
              --input tests/data/ODD_gamma_10ev_theta90deg_phi0deg_posX0mmY1250mmZ0mm_10GeV_edm4hep.root \
              --algorithm merge_within_cell \
              --outdir outputs/ci_root_validation_plots
          '
      - name: Generate detector cell plots from ROOT overlay
        run: |
          docker exec step2point-key4hep-regression /bin/bash -lc '
            set -eo pipefail
            cd /workspace
            source /cvmfs/sw.hsf.org/key4hep/setup.sh
            source .venv-key4hep/bin/activate
            python examples/plot_detector_cells.py \
              --compact-xml OpenDataDetector/xml/OpenDataDetector.xml \
              --collection ECalBarrelCollection \
              --draw-cells \
              --overlay-input tests/data/ODD_gamma_10ev_theta90deg_phi0deg_posX0mmY1250mmZ0mm_10GeV_edm4hep.root \
              --overlay-collections ECalBarrelCollection ECalEndcapCollection HCalBarrelCollection HCalEndcapCollection \
              --overlay-shower-index 0 \
              --outdir outputs/ci_detector_cells_root \
              --zoom \
              --module 9
            python examples/plot_detector_cells.py \
              --compact-xml OpenDataDetector/xml/OpenDataDetector.xml \
              --collection ECalBarrelCollection \
              --draw-cells \
              --sensitive-only \
              --overlay-input tests/data/ODD_gamma_10ev_theta90deg_phi0deg_posX0mmY1250mmZ0mm_10GeV_edm4hep.root \
              --overlay-collections ECalBarrelCollection ECalEndcapCollection HCalBarrelCollection HCalEndcapCollection \
              --overlay-shower-index 0 \
              --outdir outputs/ci_detector_cells_root \
              --zoom \
              --module 9
          '
      - name: Upload ROOT validation plots
        uses: actions/upload-artifact@v4
        with:
          name: root-validation-plots
          path: outputs/ci_root_validation_plots/
      - name: Upload ROOT detector cell plots
        uses: actions/upload-artifact@v4
        with:
          name: root-detector-cell-plots
          path: outputs/ci_detector_cells_root/
