<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Benchmark panel mockup</title>
  <desc id="desc">Mockup showing stable and intentionally changing observables for shower compression.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f9fc"/>
      <stop offset="100%" stop-color="#eef3ff"/>
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#5c6bc0" flood-opacity="0.14"/>
    </filter>

    <style>
      .title{font:700 32px Inter,Arial,sans-serif;fill:#1f2a44}
      .subtitle{font:500 17px Inter,Arial,sans-serif;fill:#4d5b7c}
      .card{fill:#fff;stroke:#d9e1f2;stroke-width:1.5}
      .heading{font:700 21px Inter,Arial,sans-serif;fill:#21304f}
      .label{font:600 15px Inter,Arial,sans-serif;fill:#364867}
      .small{font:500 12px Inter,Arial,sans-serif;fill:#6a7b99}
      .tiny{font:500 11px Inter,Arial,sans-serif;fill:#7a88a5}
      .ok{fill:#1b8f5a}
      .warn{fill:#b45f06}
      .axis{stroke:#9fb0d0;stroke-width:1.8}
      .line1{fill:none;stroke:#4f6bed;stroke-width:3.5}
      .line2{fill:none;stroke:#ef6c57;stroke-width:3.5;stroke-dasharray:8 7}
      .hist1{fill:#90caf9;opacity:.85}
      .hist2{fill:#ffab91;opacity:.75}
      .badge{font:700 11px Inter,Arial,sans-serif;letter-spacing:.08em}
      .tablehead{font:700 13px Inter,Arial,sans-serif;fill:#2f4267}
      .tabletext{font:500 11.5px Inter,Arial,sans-serif;fill:#51627f}
      .divider{stroke:#e4ebf7;stroke-width:1}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" fill="url(#bg)"/>
  <text x="70" y="70" class="title">Physics benchmark panel</text>
  <text x="70" y="100" class="subtitle">Compare what should stay stable against what is intentionally changed by compression</text>

  <g filter="url(#shadow)">
    <rect class="card" x="60" y="140" width="520" height="520" rx="22"/>
    <rect class="card" x="620" y="140" width="520" height="520" rx="22"/>
  </g>

  <!-- LEFT -->
  <rect x="82" y="164" width="150" height="30" rx="15" fill="#e8f5ee"/>
  <text x="101" y="183" class="badge ok">SHOULD STAY STABLE</text>
  <text x="82" y="224" class="heading">Energy and shower shape</text>

  <!-- Energy ratio -->
  <g transform="translate(82,255)">
    <text x="0" y="0" class="label">Energy ratio E<tspan baseline-shift="sub">post</tspan> / E<tspan baseline-shift="sub">pre</tspan></text>
    <text x="0" y="18" class="small">Tight around 1.0</text>
    <g transform="translate(0,38)">
      <line x1="0" y1="130" x2="190" y2="130" class="axis"/>
      <line x1="0" y1="130" x2="0" y2="20" class="axis"/>
      <path d="M18 124 C55 48, 86 18, 95 16 C104 18, 135 50, 172 124" class="line1"/>
      <line x1="95" y1="10" x2="95" y2="130" stroke="#7bbf92" stroke-width="2.5" stroke-dasharray="6 5"/>
      <text x="84" y="148" class="tiny">1.0</text>
    </g>
  </g>

  <!-- Longitudinal profile -->
  <g transform="translate(320,255)">
    <text x="0" y="0" class="label">Longitudinal profile</text>
    <text x="0" y="18" class="small">Pre and post should overlap</text>
    <g transform="translate(0,38)">
      <line x1="0" y1="130" x2="190" y2="130" class="axis"/>
      <line x1="0" y1="130" x2="0" y2="20" class="axis"/>
      <path d="M0 125 C20 120, 30 70, 55 45 C80 25, 110 28, 145 90 C160 115, 175 126, 190 128" class="line1"/>
      <path d="M0 126 C22 122, 34 73, 59 49 C83 30, 112 31, 147 91 C162 113, 176 125, 190 127" class="line2"/>
    </g>
  </g>

  <!-- Cell energy spectrum -->
  <g transform="translate(82,455)">
    <text x="0" y="0" class="label">Cell-energy spectrum</text>
    <text x="0" y="18" class="small">Compared in log scale, aggregated by cell ID</text>
    <g transform="translate(0,38)">
      <line x1="0" y1="130" x2="190" y2="130" class="axis"/>
      <line x1="0" y1="130" x2="0" y2="20" class="axis"/>
      <rect x="12" y="82" width="20" height="48" class="hist1"/>
      <rect x="38" y="58" width="20" height="72" class="hist1"/>
      <rect x="64" y="37" width="20" height="93" class="hist1"/>
      <rect x="90" y="49" width="20" height="81" class="hist1"/>
      <rect x="116" y="72" width="20" height="58" class="hist1"/>
      <rect x="142" y="92" width="20" height="38" class="hist1"/>
      <rect x="16" y="86" width="20" height="44" class="hist2"/>
      <rect x="42" y="60" width="20" height="70" class="hist2"/>
      <rect x="68" y="39" width="20" height="91" class="hist2"/>
      <rect x="94" y="51" width="20" height="79" class="hist2"/>
      <rect x="120" y="74" width="20" height="56" class="hist2"/>
      <rect x="146" y="95" width="20" height="35" class="hist2"/>
    </g>
  </g>

  <!-- Shower moments -->
  <g transform="translate(320,455)">
    <text x="0" y="0" class="label">Shower moments</text>
    <text x="0" y="18" class="small">Centroid and widths should remain close</text>
    <g transform="translate(0,38)">
      <line x1="0" y1="130" x2="190" y2="130" class="axis"/>
      <line x1="0" y1="130" x2="0" y2="20" class="axis"/>
      <circle cx="55" cy="75" r="7" fill="#4f6bed"/>
      <circle cx="95" cy="68" r="7" fill="#4f6bed"/>
      <circle cx="135" cy="60" r="7" fill="#4f6bed"/>
      <circle cx="60" cy="78" r="7" fill="#ef6c57"/>
      <circle cx="98" cy="70" r="7" fill="#ef6c57"/>
      <circle cx="138" cy="63" r="7" fill="#ef6c57"/>
      <line x1="55" y1="75" x2="60" y2="78" class="line2"/>
      <line x1="95" y1="68" x2="98" y2="70" class="line2"/>
      <line x1="135" y1="60" x2="138" y2="63" class="line2"/>
    </g>
  </g>

  <!-- RIGHT -->
  <rect x="642" y="164" width="165" height="30" rx="15" fill="#fff1e8"/>
  <text x="662" y="183" class="badge warn">EXPECTED TO CHANGE</text>
  <text x="642" y="224" class="heading">Compression strength</text>

  <!-- Point-count ratio -->
  <g transform="translate(642,255)">
    <text x="0" y="0" class="label">Point-count ratio N<tspan baseline-shift="sub">post</tspan> / N<tspan baseline-shift="sub">pre</tspan></text>
    <text x="0" y="18" class="small">Lower is better, but only if physics stays stable</text>
    <g transform="translate(0,38)">
      <line x1="0" y1="130" x2="190" y2="130" class="axis"/>
      <line x1="0" y1="130" x2="0" y2="20" class="axis"/>
      <rect x="18" y="96" width="20" height="34" class="hist2"/>
      <rect x="44" y="72" width="20" height="58" class="hist2"/>
      <rect x="70" y="46" width="20" height="84" class="hist2"/>
      <rect x="96" y="30" width="20" height="100" class="hist2"/>
      <rect x="122" y="67" width="20" height="63" class="hist2"/>
      <rect x="148" y="100" width="20" height="30" class="hist2"/>
    </g>
  </g>

  <!-- Point-energy spectrum -->
  <g transform="translate(880,255)">
    <text x="0" y="0" class="label">Point-energy spectrum</text>
    <text x="0" y="18" class="small">Granularity changes after merging or clustering</text>
    <g transform="translate(0,38)">
      <line x1="0" y1="130" x2="190" y2="130" class="axis"/>
      <line x1="0" y1="130" x2="0" y2="20" class="axis"/>
      <path d="M5 110 C25 98, 48 82, 70 62 C90 47, 110 46, 135 58 C155 69, 175 90, 190 112" class="line1"/>
      <path d="M5 118 C25 110, 48 94, 70 75 C90 58, 112 48, 136 51 C156 55, 176 72, 190 96" class="line2"/>
    </g>
  </g>

  <!-- Summary box -->
  <g transform="translate(642,455)">
    <text x="0" y="0" class="label">Algorithm summary</text>
    <text x="0" y="18" class="small">Compact overview without hiding trade-offs</text>
    <g transform="translate(0,38)">
      <rect x="0" y="0" width="460" height="160" rx="18" fill="#f9fbff" stroke="#dbe4f5"/>
      <line x1="105" y1="16" x2="105" y2="148" class="divider"/>
      <line x1="225" y1="16" x2="225" y2="148" class="divider"/>
      <line x1="365" y1="16" x2="365" y2="148" class="divider"/>
      <line x1="14" y1="42" x2="446" y2="42" class="divider"/>
      <line x1="14" y1="68" x2="446" y2="68" class="divider"/>
      <line x1="14" y1="94" x2="446" y2="94" class="divider"/>
      <line x1="14" y1="120" x2="446" y2="120" class="divider"/>

      <text x="18" y="30" class="tablehead">Metric</text>
      <text x="125" y="30" class="tablehead">identity</text>
      <text x="245" y="30" class="tablehead">merge_within_cell</text>
      <text x="385" y="30" class="tablehead">voxel_grid</text>

      <text x="18" y="60" class="tabletext">Energy ratio</text>
      <text x="18" y="86" class="tabletext">Profiles</text>
      <text x="18" y="112" class="tabletext">Cell spectrum</text>
      <text x="18" y="138" class="tabletext">Point ratio</text>

      <text x="130" y="60" class="tabletext">1.000</text>
      <text x="130" y="86" class="tabletext">excellent</text>
      <text x="130" y="112" class="tabletext">excellent</text>
      <text x="130" y="138" class="tabletext">1.00</text>

      <text x="265" y="60" class="tabletext">1.000</text>
      <text x="265" y="86" class="tabletext">excellent</text>
      <text x="265" y="112" class="tabletext">excellent</text>
      <text x="265" y="138" class="tabletext">0.42</text>

      <text x="392" y="60" class="tabletext">0.998</text>
      <text x="392" y="86" class="tabletext">good</text>
      <text x="392" y="112" class="tabletext">fair</text>
      <text x="392" y="138" class="tabletext">0.18</text>
    </g>
    <text x="0" y="228" class="tiny">Example only — not real data.</text>
  </g>
</svg>
